<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyUI + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <title>Github Issues Tracker</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="bg-white border-b border-[#E9E9E9]">
      <div class="navbar bg-base-100 shadow-sm p-4 sm:px-14">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <img class="w-9" src="assets/github-logo.png" alt="" />
            <h1 class="hidden sm:flex text-2xl font-semibold">
              Github Issues Tracker
            </h1></a
          >
        </div>
        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>
    <section class="py-15 w-11/12 mx-auto space-y-4">
      <div id="" class="bg-white p-6 rounded-lg flex gap-2">
        <button id="allBtn" class="btn btn-primary w-30">All</button>
        <button id="openBtn" class="btn btn-primary w-30">Open</button>
        <button id="closedBtn" class="btn btn-primary w-30">Closed</button>
      </div>
      <div class="bg-white rounded-lg">
        <div class="flex p-6 justify-between items-center">
          <div class="flex gap-3">
            <div
              class="bg-[#4800ff21] w-[50px] rounded-full flex items-center justify-center"
            >
              <img
                class="flex justify-center items-center"
                src="assets/Aperture.png"
                alt=""
              />
            </div>
            <div class="">
              <h1 class="text-xl font-semibold">50 Issues</h1>
              <p class="text-[#64748B] whitespace-nowrap">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="flex justify-center items-center gap-2">
              <span
                class="w-3 h-3 rounded-full bg-[#00A96E] inline-block"
              ></span>
              <h1>Open</h1>
            </div>
            <div class="flex justify-center items-center gap-2">
              <span
                class="w-3 h-3 rounded-full bg-[#A855F7] inline-block"
              ></span>
              <h1>Closed</h1>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
